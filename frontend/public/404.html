<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>SeatServe | Redirecting...</title>
        <script>
            (function () {
                const publicUrl = "%PUBLIC_URL%";
                const repoBase = publicUrl.replace(/\/$/, "");
                const currentPath = window.location.pathname.slice(repoBase.length) || "/";
                const normalizedPath = currentPath === "/404.html" ? "/" : currentPath;
                const encodedTarget = encodeURIComponent(normalizedPath + window.location.search + window.location.hash);
                window.location.replace(`${repoBase}/?p=${encodedTarget}`);
            })();
        </script>
    </head>
    <body>
        <p>Redirecting...</p>
    </body>
</html>
